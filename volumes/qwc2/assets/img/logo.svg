<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Gradient for the background circle -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </radialGradient>
    <!-- Gradient for Earth -->
    <radialGradient id="earthGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="40%" stop-color="#2196f3"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
    <!-- Gradient for land masses -->
    <radialGradient id="landGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </radialGradient>
    <!-- Satellite body gradient -->
    <linearGradient id="satBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eceff1"/>
      <stop offset="100%" stop-color="#b0bec5"/>
    </linearGradient>
    <!-- Solar panel gradient -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="50%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <!-- Orbit ring glow -->
    <filter id="orbitGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Atmosphere glow -->
    <radialGradient id="atmosGrad" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#4fc3f7" stop-opacity="0"/>
      <stop offset="90%" stop-color="#4fc3f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#81d4fa" stop-opacity="0.3"/>
    </radialGradient>
    <!-- Signal beam gradient -->
    <linearGradient id="signalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="124" fill="url(#bgGrad)"/>
  <circle cx="128" cy="128" r="124" fill="none" stroke="#263850" stroke-width="2"/>

  <!-- Subtle star field -->
  <circle cx="30" cy="45" r="1.2" fill="#ffffff" opacity="0.6"/>
  <circle cx="55" cy="28" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="210" cy="35" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="225" cy="60" r="0.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="195" cy="22" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="42" cy="75" r="0.7" fill="#ffffff" opacity="0.4"/>
  <circle cx="18" cy="110" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="235" cy="95" r="0.9" fill="#ffffff" opacity="0.5"/>
  <circle cx="70" cy="15" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="160" cy="18" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="240" cy="140" r="0.7" fill="#ffffff" opacity="0.4"/>
  <circle cx="20" cy="160" r="0.9" fill="#ffffff" opacity="0.3"/>

  <!-- Earth - positioned lower-right to show partial globe -->
  <clipPath id="earthClip">
    <circle cx="148" cy="170" r="80"/>
  </clipPath>

  <!-- Earth base (ocean) -->
  <circle cx="148" cy="170" r="80" fill="url(#earthGrad)"/>

  <!-- Land masses (simplified, stylized continents) -->
  <g clip-path="url(#earthClip)">
    <!-- Large continent (Africa/Europe-like) -->
    <path d="M130,115 Q140,110 155,112 Q165,118 168,130 Q172,145 170,160
             Q168,175 160,185 Q150,195 140,192 Q130,188 125,175
             Q120,160 122,145 Q124,130 130,115 Z"
          fill="url(#landGrad)" opacity="0.85"/>

    <!-- Smaller landmass (top right) -->
    <path d="M175,108 Q185,105 195,110 Q205,118 208,130 Q210,140 205,148
             Q198,155 188,152 Q178,148 174,138 Q170,125 175,108 Z"
          fill="url(#landGrad)" opacity="0.85"/>

    <!-- Island cluster (bottom left) -->
    <path d="M100,170 Q108,165 118,168 Q125,174 122,182
             Q118,190 108,190 Q98,188 96,180 Q95,175 100,170 Z"
          fill="url(#landGrad)" opacity="0.8"/>

    <!-- Small island -->
    <path d="M185,170 Q192,167 198,172 Q200,178 195,182
             Q188,184 185,178 Q183,174 185,170 Z"
          fill="url(#landGrad)" opacity="0.75"/>

    <!-- Polar ice suggestion at bottom -->
    <path d="M105,230 Q128,218 155,220 Q180,222 200,232 Q180,245 148,248
             Q115,246 105,230 Z"
          fill="#ffffff" opacity="0.4"/>

    <!-- Cloud wisps -->
    <ellipse cx="140" cy="140" rx="25" ry="6" fill="#ffffff" opacity="0.2" transform="rotate(-15,140,140)"/>
    <ellipse cx="175" cy="165" rx="20" ry="5" fill="#ffffff" opacity="0.18" transform="rotate(10,175,165)"/>
    <ellipse cx="120" cy="195" rx="22" ry="5" fill="#ffffff" opacity="0.15" transform="rotate(-8,120,195)"/>
  </g>

  <!-- Atmosphere glow -->
  <circle cx="148" cy="170" r="83" fill="url(#atmosGrad)"/>

  <!-- Orbit path (elliptical, tilted) -->
  <ellipse cx="128" cy="128" rx="105" ry="40"
           fill="none" stroke="#4fc3f7" stroke-width="1.2" stroke-dasharray="4,3"
           opacity="0.35" transform="rotate(-35,128,128)"
           filter="url(#orbitGlow)"/>

  <!-- Signal beam from satellite to Earth -->
  <path d="M82,68 L118,140 L100,145 Z"
        fill="url(#signalGrad)" opacity="0.3"/>

  <!-- Signal wave arcs -->
  <path d="M90,95 Q100,85 110,95" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>
  <path d="M85,100 Q100,87 115,100" fill="none" stroke="#4fc3f7" stroke-width="0.8" opacity="0.2"/>

  <!-- Satellite group -->
  <g transform="translate(78,58) rotate(-35)">
    <!-- Left solar panel -->
    <rect x="-36" y="-6" width="28" height="14" rx="1.5" ry="1.5" fill="url(#panelGrad)" stroke="#0d47a1" stroke-width="0.8"/>
    <!-- Panel grid lines (left) -->
    <line x1="-29" y1="-6" x2="-29" y2="8" stroke="#0d47a1" stroke-width="0.5" opacity="0.5"/>
    <line x1="-22" y1="-6" x2="-22" y2="8" stroke="#0d47a1" stroke-width="0.5" opacity="0.5"/>
    <line x1="-15" y1="-6" x2="-15" y2="8" stroke="#0d47a1" stroke-width="0.5" opacity="0.5"/>
    <line x1="-36" y1="1" x2="-8" y2="1" stroke="#0d47a1" stroke-width="0.5" opacity="0.5"/>

    <!-- Panel arm left -->
    <rect x="-8" y="-1" width="6" height="4" fill="#90a4ae"/>

    <!-- Satellite body -->
    <rect x="-2" y="-9" width="18" height="20" rx="2.5" ry="2.5" fill="url(#satBodyGrad)" stroke="#78909c" stroke-width="0.8"/>

    <!-- Body details -->
    <rect x="1" y="-5" width="12" height="6" rx="1" ry="1" fill="#455a64" opacity="0.6"/>
    <circle cx="7" cy="-2" r="2" fill="#4fc3f7" opacity="0.8"/>
    <!-- Antenna dish -->
    <line x1="7" y1="11" x2="7" y2="17" stroke="#78909c" stroke-width="1.2"/>
    <path d="M2,17 Q7,21 12,17" fill="none" stroke="#b0bec5" stroke-width="1.5"/>
    <!-- Status light -->
    <circle cx="12" cy="5" r="1.2" fill="#4caf50" opacity="0.9"/>

    <!-- Panel arm right -->
    <rect x="16" y="-1" width="6" height="4" fill="#90a4ae"/>

    <!-- Right solar panel -->
    <rect x="22" y="-6" width="28" height="14" rx="1.5" ry="1.5" fill="url(#panelGrad)" stroke="#0d47a1" stroke-width="0.8"/>
    <!-- Panel grid lines (right) -->
    <line x1="29" y1="-6" x2="29" y2="8" stroke="#0d47a1" stroke-width="0.5" opacity="0.5"/>
    <line x1="36" y1="-6" x2="36" y2="8" stroke="#0d47a1" stroke-width="0.5" opacity="0.5"/>
    <line x1="43" y1="-6" x2="43" y2="8" stroke="#0d47a1" stroke-width="0.5" opacity="0.5"/>
    <line x1="22" y1="1" x2="50" y2="1" stroke="#0d47a1" stroke-width="0.5" opacity="0.5"/>

    <!-- Highlight/shine on body -->
    <rect x="0" y="-8" width="7" height="3" rx="1" ry="1" fill="#ffffff" opacity="0.25"/>
  </g>

  <!-- Second orbit decoration (partial, behind Earth) -->
  <path d="M25,175 Q50,210 90,225"
        fill="none" stroke="#4fc3f7" stroke-width="0.8" stroke-dasharray="3,4"
        opacity="0.2"/>
</svg>
